name: Refresh China-mainland public AI signals

on:
  workflow_dispatch:
  schedule:
    # Every six hours, offset from the hour to reduce scheduled-job congestion.
    - cron: '17 */6 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-live-signals
  cancel-in-progress: false

jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the current public queue
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and normalize public signals
        run: npm run refresh:signals

      - name: Validate the generated queue
        run: npm run check:signals

      - id: queue-change
        name: Commit only meaningful queue changes
        run: |
          if git diff --quiet -- live-signals.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No signal changes to publish."
            exit 0
          fi
          git config user.name "ai-radar-signal-bot"
          git config user.email "ai-radar-signal-bot@users.noreply.github.com"
          git add live-signals.js
          git commit -m "chore: refresh public AI signals"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # A commit made with GITHUB_TOKEN does not start another push workflow.
      # Deploy here so a refreshed queue is visible without manual intervention.
      - name: Validate the refreshed release
        if: steps.queue-change.outputs.changed == 'true'
        run: npm run check:release

      - name: Configure GitHub Pages
        if: steps.queue-change.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload refreshed Pages artifact
        if: steps.queue-change.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

      - name: Deploy refreshed Pages artifact
        if: steps.queue-change.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
